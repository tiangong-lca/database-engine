version: 1
layout: repo
lastReviewedAt: 2026-04-23
lastReviewedCommit: 4495c2c5771c03789c0ec26de5852f6a33001fec

# Keep deterministic governance facts here.
# AGENTS.md remains the repo contract entrypoint.
# Narrow source docs keep proof, repo-shape, and branching explanation.
catalog:
  repos:
    - id: database-engine
      path: .
      canonicalRepo: tiangong-lca/database-engine
      entryDoc: AGENTS.md
      branchPolicyDoc: docs/agents/supabase-branching.md
      workflowDocs:
        - docs/agents/repo-validation.md
        - docs/agents/repo-architecture.md
      workspaceIntegrationRequired: true

ownership:
  domains:
    - id: repo-governance-and-docs
      paths:
        include:
          - AGENTS.md
          - README.md
          - README.zh-CN.md
          - .docpact/**
          - docs/agents/**
          - .github/workflows/ai-doc-lint.yml
      ownerRepo: database-engine
    - id: supabase-schema-branch-config-and-operator-templates
      paths:
        include:
          - supabase/config.toml
          - supabase/migrations/**
          - supabase/seed.sql
          - supabase/seeds/**
          - supabase/tests/**
          - .env.supabase.dev.local.example
          - .env.supabase.main.local.example
          - .github/workflows/supabase-dev.yml
      ownerRepo: database-engine
    - id: schema-workspace-and-migration-tooling
      paths:
        include:
          - scripts/**
          - supabase/workspace/**
      ownerRepo: database-engine

coverage:
  include:
    - AGENTS.md
    - README.md
    - README.zh-CN.md
    - .docpact/**
    - docs/agents/repo-validation.md
    - docs/agents/repo-architecture.md
    - docs/agents/supabase-branching.md
    - docs/agents/supabase-branching_CN.md
    - scripts/README.md
    - scripts/README.zh-CN.md
    - supabase/workspace/README.md
    - supabase/workspace/README.zh-CN.md
    - supabase/config.toml
    - supabase/migrations/**
    - supabase/seed.sql
    - supabase/seeds/**
    - supabase/tests/**
    - scripts/**
    - supabase/workspace/**
    - .env.supabase.dev.local.example
    - .env.supabase.main.local.example
    - .github/workflows/ai-doc-lint.yml
    - .github/workflows/supabase-dev.yml
  exclude:
    - .git/**
    - .github/scripts/**

freshness:
  warn_after_commits: 40
  warn_after_days: 60
  critical_after_days: 120

routing:
  intents:
    migration-and-rpc:
      paths:
        - supabase/migrations/**
        - supabase/seed.sql
        - supabase/seeds/**
        - supabase/tests/**
    branch-config:
      paths:
        - supabase/config.toml
        - .env.supabase.dev.local.example
        - .env.supabase.main.local.example
        - .github/workflows/supabase-dev.yml
        - docs/agents/supabase-branching.md
        - docs/agents/supabase-branching_CN.md
    preview-drift:
      paths:
        - supabase/config.toml
        - supabase/migrations/**
        - supabase/tests/**
        - docs/agents/repo-validation.md
        - docs/agents/supabase-branching.md
        - docs/agents/supabase-branching_CN.md
    schema-workspace:
      paths:
        - scripts/**
        - supabase/workspace/**
        - docs/agents/repo-architecture.md
        - scripts/README.md
        - scripts/README.zh-CN.md
        - supabase/workspace/README.md
        - supabase/workspace/README.zh-CN.md
    repo-docs:
      paths:
        - AGENTS.md
        - README.md
        - README.zh-CN.md
        - .docpact/**
        - docs/agents/**
        - scripts/README.md
        - scripts/README.zh-CN.md
        - supabase/workspace/README.md
        - supabase/workspace/README.zh-CN.md
    proof:
      paths:
        - docs/agents/repo-validation.md
        - supabase/config.toml
        - supabase/migrations/**
        - supabase/seed.sql
        - supabase/seeds/**
        - supabase/tests/**
        - .github/workflows/supabase-dev.yml
    root-integration:
      paths:
        - AGENTS.md
        - docs/agents/supabase-branching.md
        - docs/agents/supabase-branching_CN.md

docInventory:
  include:
    - AGENTS.md
    - README.md
    - README.zh-CN.md
    - .docpact/config.yaml
    - docs/agents/repo-validation.md
    - docs/agents/repo-architecture.md
    - docs/agents/supabase-branching.md
    - docs/agents/supabase-branching_CN.md
    - scripts/README.md
    - scripts/README.zh-CN.md
    - supabase/workspace/README.md
    - supabase/workspace/README.zh-CN.md

repo:
  id: database-engine
  owner: database-engine

rules:
  - id: database-engine-bootstrap-contract
    scope: repo
    repo: database-engine
    triggers:
      - path: AGENTS.md
        kind: doc-contract
      - path: .docpact/**
        kind: doc-ai-layer
      - path: docs/agents/repo-validation.md
        kind: deep-doc
      - path: docs/agents/repo-architecture.md
        kind: deep-doc
      - path: docs/agents/supabase-branching.md
        kind: deep-doc
      - path: docs/agents/supabase-branching_CN.md
        kind: deep-doc
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/repo-architecture.md
        mode: review_or_update
    reason: Repo entry guidance, machine-readable routing, and retained source docs must stay aligned.
  - id: database-engine-readme-and-landing-contract
    scope: repo
    repo: database-engine
    triggers:
      - path: README.md
        kind: repo-landing
      - path: README.zh-CN.md
        kind: repo-landing
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: README.md
        mode: review_or_update
      - path: README.zh-CN.md
        mode: review_or_update
    reason: Repo landing docs should stay aligned with the current repo contract and AI entry surface.
  - id: database-engine-branch-config-and-automation
    scope: repo
    repo: database-engine
    triggers:
      - path: supabase/config.toml
        kind: db-config
      - path: .github/workflows/supabase-dev.yml
        kind: automation
      - path: .env.supabase.dev.local.example
        kind: operator-template
      - path: .env.supabase.main.local.example
        kind: operator-template
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/supabase-branching.md
        mode: review_or_update
      - path: docs/agents/supabase-branching_CN.md
        mode: review_or_update
    reason: Branch bindings and persistent dev automation change repo routing, proof, and branch-operation guidance together.
  - id: database-engine-migration-and-seed-contract
    scope: repo
    repo: database-engine
    triggers:
      - path: supabase/migrations/**
        kind: db-schema
      - path: supabase/seed.sql
        kind: db-seed
      - path: supabase/seeds/**
        kind: db-seed
    requiredDocs:
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/repo-architecture.md
        mode: review_or_update
    reason: Schema and seed changes affect authoring routes, source-of-truth boundaries, and minimum proof expectations.
  - id: database-engine-sql-tests-contract
    scope: repo
    repo: database-engine
    triggers:
      - path: supabase/tests/**
        kind: db-test
    requiredDocs:
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
    reason: SQL assertion changes can alter the minimum proof story for future database work.
  - id: database-engine-schema-workspace-tooling
    scope: repo
    repo: database-engine
    triggers:
      - path: scripts/**
        kind: tooling
      - path: supabase/workspace/**
        kind: generated-workspace
    requiredDocs:
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
      - path: docs/agents/repo-architecture.md
        mode: review_or_update
      - path: scripts/README.md
        mode: review_or_update
      - path: scripts/README.zh-CN.md
        mode: review_or_update
      - path: supabase/workspace/README.md
        mode: review_or_update
      - path: supabase/workspace/README.zh-CN.md
        mode: review_or_update
    reason: Schema-workspace scripts and generated inspection trees need explicit guidance because some paths are stable and others are disposable.
  - id: database-engine-doc-maintenance-contract
    scope: repo
    repo: database-engine
    triggers:
      - path: .github/workflows/ai-doc-lint.yml
        kind: automation
    requiredDocs:
      - path: AGENTS.md
        mode: review_or_update
      - path: .docpact/config.yaml
        mode: review_or_update
      - path: docs/agents/repo-validation.md
        mode: review_or_update
    reason: Repo-local documentation maintenance automation must stay aligned with the repo contract and governed-doc rules.
